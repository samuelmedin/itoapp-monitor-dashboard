<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Monitor ITO — CASEM IT</title>
<meta name="description" content="Estado diario del monitoreo sintetico de app.itoapp.cl" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#050914" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  :root {
    --navy-950: #050914;
    --navy-900: #070d1c;
    --navy-800: #0b1428;
    --navy-700: #101c38;
    --navy-600: #162548;
    --cyan-400: #4fd6ff;
    --cyan-300: #7fe4ff;
    --cyan-200: #bdf0ff;
    --paper: #f4fbff;
    --ink-muted: #9db0c9;
    --ink-faint: #6b7c96;
    --ok: #4ade80;
    --ok-soft: rgba(74, 222, 128, 0.14);
    --fail: #f87171;
    --fail-soft: rgba(248, 113, 113, 0.14);
    --warn: #facc15;
    --warn-soft: rgba(250, 204, 21, 0.14);
    --none: #2a3b57;
    --mono: ui-monospace, "SFMono-Regular", "Cascadia Mono", "Consolas", monospace;
    --sans: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    background: var(--navy-950);
    color: var(--paper);
    font-family: var(--sans);
    min-height: 100%;
  }
  body {
    padding: max(20px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
  }
  .wrap { max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }

  header { display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 9px;
    background: linear-gradient(145deg, var(--cyan-400), #1c8fe0);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 13px; color: var(--navy-950);
  }
  .brand-text { display: flex; flex-direction: column; line-height: 1.2; }
  .brand-text strong { font-size: 15px; font-weight: 650; }
  .brand-text span { font-size: 11.5px; color: var(--ink-muted); }
  .refresh-btn {
    appearance: none; border: 1px solid rgba(127,228,255,0.18); background: var(--navy-800);
    color: var(--ink-muted); border-radius: 8px; padding: 7px 10px; font-size: 12px;
    font-family: var(--mono); display: flex; align-items: center; gap: 6px; cursor: pointer;
  }
  .refresh-btn:active { transform: scale(0.97); }

  .status-card {
    border-radius: 16px; padding: 22px; border: 1px solid rgba(127,228,255,0.14);
    background: radial-gradient(120% 140% at 15% 0%, rgba(79,214,255,0.10), transparent 55%), var(--navy-800);
  }
  .status-eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--cyan-300); margin: 0 0 8px;
  }
  .status-pill {
    display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 999px;
    font-weight: 650; font-size: 15px; margin-bottom: 10px;
  }
  .status-pill.ok { background: var(--ok-soft); color: var(--ok); }
  .status-pill.warn { background: var(--warn-soft); color: var(--warn); }
  .status-pill.fail { background: var(--fail-soft); color: var(--fail); }
  .status-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .status-meta { color: var(--ink-muted); font-size: 13px; line-height: 1.6; }
  .status-meta b { color: var(--paper); font-variant-numeric: tabular-nums; }

  .project-chips { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
  .project-chip {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px;
    background: var(--navy-900); border: 1px solid rgba(127,228,255,0.08);
    text-decoration: none; color: inherit;
  }
  .project-chip .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .project-chip .dot.ok { background: var(--ok); box-shadow: 0 0 8px rgba(74,222,128,0.5); }
  .project-chip .dot.fail { background: var(--fail); box-shadow: 0 0 8px rgba(248,113,113,0.5); }
  .project-chip .chip-name { flex: 1; font-size: 13.5px; font-weight: 550; }
  .project-chip .chip-note { font-size: 11.5px; color: var(--ink-muted); font-family: var(--mono); white-space: nowrap; }
  .project-chip .chip-note.warn { color: var(--warn); }

  .project-section {
    border-radius: 14px; border: 1px solid rgba(127,228,255,0.10); overflow: hidden;
  }
  .project-section-head {
    display: flex; align-items: center; gap: 8px; padding: 12px 14px;
    background: var(--navy-700); font-size: 13px; font-weight: 650;
  }
  .project-section-head .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .project-section-head .dot.ok { background: var(--ok); }
  .project-section-head .dot.fail { background: var(--fail); }
  .project-section-body { display: flex; flex-direction: column; gap: 1px; background: rgba(127,228,255,0.06); }

  .flows { display: flex; flex-direction: column; gap: 8px; }
  .flow-row {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    background: var(--navy-800);
  }
  .flows > .flow-row { border-radius: 12px; border: 1px solid rgba(127,228,255,0.10); }
  .flow-icon {
    width: 22px; height: 22px; border-radius: 50%; flex: none;
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
  }
  .flow-icon.ok { background: var(--ok-soft); color: var(--ok); }
  .flow-icon.fail { background: var(--fail-soft); color: var(--fail); }
  .flow-icon.skip { background: rgba(157,176,201,0.14); color: var(--ink-muted); }
  .flow-body { flex: 1; min-width: 0; }
  .flow-name { font-size: 13.5px; font-weight: 550; }
  .flow-note { font-size: 12px; color: var(--ink-muted); margin-top: 2px; overflow-wrap: break-word; }

  section h2 {
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint);
    font-family: var(--mono); margin: 0 0 10px;
  }
  .project-detail-list { display: flex; flex-direction: column; gap: 14px; }

  .history-strip { display: flex; flex-wrap: wrap; gap: 4px; }
  .history-day {
    width: 13px; height: 13px; border-radius: 3px; background: var(--none);
    position: relative;
  }
  .history-day.ok { background: var(--ok); }
  .history-day.fail { background: var(--fail); }
  .history-legend { display: flex; gap: 14px; margin-top: 10px; font-size: 11.5px; color: var(--ink-muted); }
  .history-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .legend-swatch { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }

  footer { text-align: center; font-family: var(--mono); font-size: 11px; color: var(--ink-faint); padding-top: 4px; }

  .empty-state { text-align: center; padding: 40px 16px; color: var(--ink-muted); font-size: 13.5px; }
  .empty-state strong { display: block; color: var(--paper); margin-bottom: 6px; font-size: 15px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 0.8s linear infinite; }

  @media (prefers-reduced-motion: reduce) {
    .spinning { animation: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-mark">IT+O</div>
      <div class="brand-text">
        <strong>Monitor ITO</strong>
        <span id="brandSub">CYG Proyectos</span>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn" type="button">↻ Actualizar</button>
  </header>

  <div id="content">
    <div class="empty-state">Cargando historial…</div>
  </div>

  <footer id="footer"></footer>
</div>

<script>
async function loadData() {
  const content = document.getElementById('content');
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '↻ Actualizando…';

  try {
    const res = await fetch('data/history.json?_=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const { history } = await res.json();
    render(history || []);
  } catch (e) {
    content.innerHTML = '<div class="empty-state"><strong>No se pudo cargar el historial</strong>' + escapeHtml(e.message) + '</div>';
  } finally {
    btn.textContent = '↻ Actualizar';
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function relativeTime(iso) {
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.round(diffMs / 60000);
  if (mins < 60) return `hace ${mins} min`;
  const hours = Math.round(mins / 60);
  if (hours < 48) return `hace ${hours} h`;
  const days = Math.round(hours / 24);
  return `hace ${days} d`;
}

// Los nombres de flujo por-proyecto vienen como "Tipo de flujo — Nombre Proyecto"
// (ver monitor.js). Login no tiene proyecto asociado.
function groupByProject(flows) {
  const login = flows.find((f) => f.name === 'Login');
  const groups = [];
  const byName = new Map();
  for (const f of flows) {
    if (f.name === 'Login') continue;
    const idx = f.name.lastIndexOf(' — ');
    const project = idx >= 0 ? f.name.slice(idx + 3) : 'General';
    const flowType = idx >= 0 ? f.name.slice(0, idx) : f.name;
    if (!byName.has(project)) {
      byName.set(project, { project, flows: [] });
      groups.push(byName.get(project));
    }
    byName.get(project).flows.push({ ...f, flowType });
  }
  return { login, groups };
}

function alertInfo(flows) {
  const withAlerts = flows.find((f) => f.note && /^Alertas\/pendientes detectados/.test(f.note));
  if (!withAlerts) return null;
  const count = (withAlerts.note.match(/\(\d+\)/g) || []).length;
  return { text: withAlerts.note.replace(/^Alertas\/pendientes detectados: /, ''), count };
}

function render(history) {
  const content = document.getElementById('content');
  const footer = document.getElementById('footer');
  const brandSub = document.getElementById('brandSub');

  if (!history.length) {
    content.innerHTML = '<div class="empty-state"><strong>Sin corridas todavia</strong>El primer informe diario va a aparecer aca despues de la proxima corrida a las 09:00.</div>';
    return;
  }

  const latest = history[history.length - 1];
  const { login, groups } = groupByProject(latest.flows);
  const allOk = latest.failed === 0;
  const anyAlerts = groups.some((g) => alertInfo(g.flows));

  brandSub.textContent = groups.length === 1 ? groups[0].project : `${groups.length} proyectos`;

  const pillClass = !allOk ? 'fail' : anyAlerts ? 'warn' : 'ok';
  const pillText = !allOk
    ? `${latest.failed} flujo(s) con fallas`
    : anyAlerts
      ? 'OK, con alertas de negocio'
      : 'Todo OK';

  const chipsHtml = groups.map((g) => {
    const ok = g.flows.every((f) => f.ok);
    const alert = alertInfo(g.flows);
    return `
      <div class="project-chip">
        <span class="dot ${ok ? 'ok' : 'fail'}"></span>
        <span class="chip-name">${escapeHtml(g.project)}</span>
        <span class="chip-note ${alert ? 'warn' : ''}">${alert ? `${alert.count} alerta(s)` : ok ? 'sin alertas' : 'con fallas'}</span>
      </div>`;
  }).join('');

  const durationSec = (latest.durationMs / 1000).toFixed(1);

  const loginRowHtml = login ? `
    <div class="flow-row" style="border-radius:12px;border:1px solid rgba(127,228,255,0.10);">
      <div class="flow-icon ${login.skipped ? 'skip' : login.ok ? 'ok' : 'fail'}">${login.skipped ? '–' : login.ok ? '✓' : '✗'}</div>
      <div class="flow-body">
        <div class="flow-name">Login</div>
        ${login.error ? `<div class="flow-note">${escapeHtml(login.error)}</div>` : ''}
      </div>
    </div>` : '';

  const projectDetailHtml = groups.map((g) => {
    const ok = g.flows.every((f) => f.ok);
    const rows = g.flows.map((f) => {
      const cls = f.skipped ? 'skip' : f.ok ? 'ok' : 'fail';
      const iconChar = f.skipped ? '–' : f.ok ? '✓' : '✗';
      const note = f.error || f.note;
      return `
        <div class="flow-row">
          <div class="flow-icon ${cls}">${iconChar}</div>
          <div class="flow-body">
            <div class="flow-name">${escapeHtml(f.flowType)}</div>
            ${note ? `<div class="flow-note">${escapeHtml(note)}</div>` : ''}
          </div>
        </div>`;
    }).join('');
    return `
      <div class="project-section">
        <div class="project-section-head">
          <span class="dot ${ok ? 'ok' : 'fail'}"></span>
          ${escapeHtml(g.project)}
        </div>
        <div class="project-section-body">${rows}</div>
      </div>`;
  }).join('');

  const last30 = history.slice(-30);
  const stripHtml = last30.map((h) => {
    const cls = h.failed === 0 ? 'ok' : 'fail';
    const label = `${h.day}: ${h.passed}/${h.total} OK`;
    return `<div class="history-day ${cls}" title="${escapeHtml(label)}"></div>`;
  }).join('');

  content.innerHTML = `
    <div class="status-card">
      <p class="status-eyebrow">Resumen — ${escapeHtml(latest.day)}</p>
      <div class="status-pill ${pillClass}">
        <span class="dot"></span>
        ${pillText}
      </div>
      <div class="status-meta">
        <b>${latest.passed}/${latest.total}</b> flujos correctos · ${relativeTime(latest.date)} · ${durationSec}s
      </div>
      <div class="project-chips">${chipsHtml}</div>
    </div>

    <section>
      <h2>Detalle</h2>
      <div class="project-detail-list">
        ${loginRowHtml}
        ${projectDetailHtml}
      </div>
    </section>

    <section>
      <h2>Ultimos ${last30.length} dias</h2>
      <div class="history-strip">${stripHtml}</div>
      <div class="history-legend">
        <span><i class="legend-swatch" style="background:var(--ok)"></i>OK</span>
        <span><i class="legend-swatch" style="background:var(--fail)"></i>Con fallas</span>
        <span><i class="legend-swatch" style="background:var(--none)"></i>Sin datos</span>
      </div>
    </section>
  `;

  footer.textContent = `${history.length} dia(s) de historial · actualizado ${new Date().toLocaleTimeString('es-CL')}`;
}

document.getElementById('refreshBtn').addEventListener('click', loadData);
loadData();
</script>
</body>
</html>
